# fly.toml
app = "ai-job-processor"
primary_region = "iad" # Оберіть найближчий регіон

[build]
  dockerfile = "Dockerfile"

# ===============================================
# 🚀 1. Конфігурація Процесу API (Web Process)
# ===============================================

[processes]
  # Назва процесу, що використовується для запуску
  web = "node dist/server.js"
  # Назва процесу Worker
  worker = "node dist/worker.js"

# -----------------------------------------------
# WEB (API Server) -
# -----------------------------------------------
[[statics]]
  guest_path = "/app/public"
  url_prefix = "/static"

[[services]]
  processes = ["web"]
  internal_port = 4000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
