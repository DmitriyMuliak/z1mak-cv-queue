name: Deploy to Fly

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    # Prevent concurrent deployments if you push twice in a row
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build & Test
        run: |
          npm run lint
          npm run build
          npm run test

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # Use rolling strategy for smooth instance replacement
        run: flyctl deploy --remote-only --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
