name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'

      - name: Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Bump Branch
        run: |
          BRANCH_NAME="chore/bump-version-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Bump version
        id: npm_version
        run: |
          # npm version without tag (tags will be created on merge)
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "v_name=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit changes
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ env.v_name }}"
          git push origin ${{ env.branch_name }}

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "chore: release ${{ env.v_name }}" \
            --body "Automated version bump to ${{ env.v_name }}. Please merge this PR to apply changes." \
            --base master \
            --head ${{ env.branch_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
