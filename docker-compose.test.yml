version: "3.9"

services:
  api:
    build: .
    command: ["node", "dist/src/server.js"]
    environment:
      PORT: "4000"
      REDIS_URL: "redis://redis:6379"
      BULLMQ_QUEUE: "ai-jobs"
      GEMINI_API_KEY: "dummy"
      INTERNAL_API_KEY: "internal-secret"
      GEMINI_BASE_URL: "http://mock-gemini:8080"
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - mock-gemini

  worker:
    build: .
    command: ["node", "-r", "./dist/src/mock/registerGeminiMock.js", "dist/src/worker.js"]
    environment:
      REDIS_URL: "redis://redis:6379"
      BULLMQ_QUEUE: "ai-jobs"
      GEMINI_API_KEY: "dummy"
      INTERNAL_API_KEY: "internal-secret"
      GEMINI_MOCK_URL: "http://mock-gemini:8080"
    depends_on:
      - redis
      - mock-gemini

  mock-gemini:
    build: .
    command: ["node", "dist/src/mock/geminiServer.js"]
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
