# Test stack includes a local Postgres container for integration tests.
# Production uses external Supabase/Postgres via DATABASE_URL.

services:
  api:
    build:
      context: .
      target: builder
    command:
      [
        'node',
        '-r',
        './dist/test/mock/fastify/plugins/auth.js',
        'dist/src/server/index.js',
      ]
    environment:
      PORT: '4000'
      REDIS_URL: 'redis://redis:6379'
      REDIS_FAMILY: '4'
      DATABASE_URL: 'postgresql://postgres:postgres@db:5432/postgres?sslmode=disable'
      BULLMQ_QUEUE: 'ai-jobs'
      GEMINI_API_KEY: 'dummy'
      INTERNAL_API_KEY: 'internal-secret'
      GEMINI_BASE_URL: 'http://mock-gemini:8080'
      DB_SYNC_INTERVAL_MS: '2000'
    ports:
      - "${TEST_API_PORT:-4000}:4000"
    depends_on:
      - redis
      - db
      - mock-gemini

  worker:
    build:
      context: .
      target: builder
    command:
      [
        'node',
        '-r',
        './dist/test/mock/MockGeminiProvider/registerGeminiMock.js',
        'dist/src/worker/index.js',
      ]
    environment:
      REDIS_URL: 'redis://redis:6379'
      REDIS_FAMILY: '4'
      DATABASE_URL: 'postgresql://postgres:postgres@db:5432/postgres'
      BULLMQ_QUEUE: 'ai-jobs'
      GEMINI_API_KEY: 'dummy'
      INTERNAL_API_KEY: 'internal-secret'
      GEMINI_MOCK_URL: 'http://mock-gemini:8080'
      DB_SYNC_INTERVAL_MS: '2000'
    depends_on:
      - redis
      - db
      - mock-gemini

  mock-gemini:
    build:
      context: .
      target: builder
    command: ['node', 'dist/test/mock/MockGeminiProvider/geminiServer.js']
    ports:
      - "${TEST_MOCK_GEMINI_PORT:-8080}:8080"

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - "${TEST_REDIS_PORT:-6379}:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'postgres'
    ports:
      - "${TEST_DB_PORT:-54321}:5432"
    volumes:
      - ./test/database/migrations:/docker-entrypoint-initdb.d
