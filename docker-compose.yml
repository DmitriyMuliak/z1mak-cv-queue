# Note: Postgres is external (Supabase in prod or local Supabase), so no DB service here.
# Provide DATABASE_URL via env/.env when running this compose file.

services:
  api:
    build: .
    command: ['node', 'dist/src/server.js']
    environment:
      PORT: '4000'
      REDIS_URL: 'redis://redis:6379'
      BULLMQ_QUEUE: 'ai-jobs'
      GEMINI_API_KEY: 'dummy'
      INTERNAL_API_KEY: 'internal-secret'
    ports:
      - '4000:4000'
    depends_on:
      - redis

  worker:
    build: .
    command: ['node', 'dist/src/worker/index.js']
    environment:
      REDIS_URL: 'redis://redis:6379'
      BULLMQ_QUEUE: 'ai-jobs'
      GEMINI_API_KEY: 'dummy'
      INTERNAL_API_KEY: 'internal-secret'
      MOCK_GEMINI_PROVIDER: 'success'
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'
